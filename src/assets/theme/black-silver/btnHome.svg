<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="chromeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="25%" style="stop-color:#C0C0C0"/>
      <stop offset="50%" style="stop-color:#A8A8A8"/>
      <stop offset="75%" style="stop-color:#C0C0C0"/>
      <stop offset="100%" style="stop-color:#909090"/>
    </linearGradient>
    <linearGradient id="borderShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="50%" style="stop-color:#C0C0C0"/>
      <stop offset="100%" style="stop-color:#606060"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect x="2" y="2" width="44" height="44" rx="10" ry="10" fill="#0a0a0a" stroke="url(#borderShine)" stroke-width="1.5"/>
  <rect x="4" y="4" width="40" height="40" rx="8" ry="8" fill="url(#chromeGrad)" opacity="0.12"/>
  
  <!-- Home Icon -->
  <g fill="none" stroke="#C0C0C0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M12 22 L24 12 L36 22"/>
    <path d="M15 20 L15 34 L33 34 L33 20"/>
    <rect x="21" y="26" width="6" height="8" fill="#0a0a0a"/>
  </g>
</svg>
