<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 48">
  <defs>
    <linearGradient id="chromeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="25%" style="stop-color:#C0C0C0"/>
      <stop offset="50%" style="stop-color:#A8A8A8"/>
      <stop offset="75%" style="stop-color:#C0C0C0"/>
      <stop offset="100%" style="stop-color:#909090"/>
    </linearGradient>
    <linearGradient id="borderShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="50%" style="stop-color:#C0C0C0"/>
      <stop offset="100%" style="stop-color:#606060"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect x="2" y="2" width="136" height="44" rx="8" ry="8" fill="#0a0a0a" stroke="url(#borderShine)" stroke-width="1.5"/>
  <rect x="4" y="4" width="132" height="40" rx="6" ry="6" fill="url(#chromeGrad)" opacity="0.15"/>
  <line x1="12" y1="6" x2="128" y2="6" stroke="#C0C0C0" stroke-width="0.5" opacity="0.6"/>
  
  <!-- Icon (Withdrawal/Cash Out) -->
  <g transform="translate(14, 12)" fill="none" stroke="#C0C0C0" stroke-width="1.5" filter="url(#glow)">
    <rect x="2" y="6" width="18" height="14" rx="2"/>
    <path d="M6 10 L16 10"/>
    <path d="M6 14 L12 14"/>
    <path d="M11 2 L11 8 M8 5 L11 2 L14 5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <text x="82" y="29" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#C0C0C0" letter-spacing="0.5">WITHDRAW</text>
</svg>
