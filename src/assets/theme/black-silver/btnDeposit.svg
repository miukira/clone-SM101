<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 48">
  <defs>
    <!-- Chrome Silver Gradient -->
    <linearGradient id="chromeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="25%" style="stop-color:#C0C0C0"/>
      <stop offset="50%" style="stop-color:#A8A8A8"/>
      <stop offset="75%" style="stop-color:#C0C0C0"/>
      <stop offset="100%" style="stop-color:#909090"/>
    </linearGradient>
    <!-- Border Shine -->
    <linearGradient id="borderShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="50%" style="stop-color:#C0C0C0"/>
      <stop offset="100%" style="stop-color:#606060"/>
    </linearGradient>
    <!-- Inner Shadow -->
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="0" dy="1" result="offsetBlur"/>
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
    </filter>
    <!-- Glow Effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Button Background -->
  <rect x="2" y="2" width="136" height="44" rx="8" ry="8" fill="#0a0a0a" stroke="url(#borderShine)" stroke-width="1.5"/>
  
  <!-- Chrome Overlay -->
  <rect x="4" y="4" width="132" height="40" rx="6" ry="6" fill="url(#chromeGrad)" opacity="0.15"/>
  
  <!-- Highlight Line Top -->
  <line x1="12" y1="6" x2="128" y2="6" stroke="#C0C0C0" stroke-width="0.5" opacity="0.6"/>
  
  <!-- Icon (Wallet/Deposit) -->
  <g transform="translate(16, 12)" fill="#C0C0C0" filter="url(#glow)">
    <rect x="0" y="4" width="20" height="16" rx="2" stroke="#C0C0C0" stroke-width="1.5" fill="none"/>
    <path d="M3 8 L17 8" stroke="#C0C0C0" stroke-width="1"/>
    <circle cx="15" cy="14" r="2" fill="#C0C0C0"/>
    <path d="M8 0 L12 0 L12 6 L8 6 Z" fill="#0a0a0a" stroke="#C0C0C0" stroke-width="1"/>
  </g>
  
  <!-- Text -->
  <text x="78" y="29" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="#C0C0C0" letter-spacing="1">DEPOSIT</text>
</svg>
