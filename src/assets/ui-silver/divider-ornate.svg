<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 24" preserveAspectRatio="none">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="30%" style="stop-color:#606060"/>
      <stop offset="50%" style="stop-color:#C0C0C0"/>
      <stop offset="70%" style="stop-color:#606060"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </linearGradient>
    <linearGradient id="chromeAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="50%" style="stop-color:#A0A0A0"/>
      <stop offset="100%" style="stop-color:#606060"/>
    </linearGradient>
  </defs>
  
  <!-- Lines -->
  <line x1="0" y1="11" x2="160" y2="11" stroke="url(#lineGrad)" stroke-width="1"/>
  <line x1="240" y1="11" x2="400" y2="11" stroke="url(#lineGrad)" stroke-width="1"/>
  <line x1="0" y1="13" x2="160" y2="13" stroke="url(#lineGrad)" stroke-width="1"/>
  <line x1="240" y1="13" x2="400" y2="13" stroke="url(#lineGrad)" stroke-width="1"/>
  
  <!-- Center Ornament -->
  <g transform="translate(200, 12)">
    <!-- Diamond Shape -->
    <polygon points="0,-10 20,0 0,10 -20,0" fill="#0a0a0a" stroke="url(#chromeAccent)" stroke-width="1"/>
    
    <!-- Inner Details -->
    <polygon points="0,-6 12,0 0,6 -12,0" fill="none" stroke="#808080" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="2" fill="#C0C0C0"/>
    
    <!-- Side Curls -->
    <path d="M-25,0 Q-30,-4 -28,-8 Q-24,-10 -20,-6" fill="none" stroke="#808080" stroke-width="1"/>
    <path d="M25,0 Q30,-4 28,-8 Q24,-10 20,-6" fill="none" stroke="#808080" stroke-width="1"/>
  </g>
</svg>
