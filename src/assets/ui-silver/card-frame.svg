<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="frameBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="25%" style="stop-color:#A0A0A0"/>
      <stop offset="50%" style="stop-color:#C0C0C0"/>
      <stop offset="75%" style="stop-color:#808080"/>
      <stop offset="100%" style="stop-color:#505050"/>
    </linearGradient>
    <linearGradient id="innerGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Outer Frame -->
  <rect x="4" y="4" width="292" height="192" rx="12" fill="url(#innerGlow)" stroke="url(#frameBorder)" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- Inner Frame Line -->
  <rect x="12" y="12" width="276" height="176" rx="8" fill="none" stroke="#404040" stroke-width="1"/>
  
  <!-- Corner Ornaments -->
  <g fill="#808080">
    <!-- Top Left -->
    <circle cx="20" cy="20" r="3"/>
    <line x1="20" y1="24" x2="20" y2="36" stroke="#606060" stroke-width="1"/>
    <line x1="24" y1="20" x2="36" y2="20" stroke="#606060" stroke-width="1"/>
    
    <!-- Top Right -->
    <circle cx="280" cy="20" r="3"/>
    <line x1="280" y1="24" x2="280" y2="36" stroke="#606060" stroke-width="1"/>
    <line x1="264" y1="20" x2="276" y2="20" stroke="#606060" stroke-width="1"/>
    
    <!-- Bottom Left -->
    <circle cx="20" cy="180" r="3"/>
    <line x1="20" y1="164" x2="20" y2="176" stroke="#606060" stroke-width="1"/>
    <line x1="24" y1="180" x2="36" y2="180" stroke="#606060" stroke-width="1"/>
    
    <!-- Bottom Right -->
    <circle cx="280" cy="180" r="3"/>
    <line x1="280" y1="164" x2="280" y2="176" stroke="#606060" stroke-width="1"/>
    <line x1="264" y1="180" x2="276" y2="180" stroke="#606060" stroke-width="1"/>
  </g>
  
  <!-- Top shine line -->
  <line x1="24" y1="8" x2="276" y2="8" stroke="#404040" stroke-width="0.5"/>
</svg>
