<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="chromeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="30%" style="stop-color:#C0C0C0"/>
      <stop offset="70%" style="stop-color:#A0A0A0"/>
      <stop offset="100%" style="stop-color:#808080"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <circle cx="16" cy="16" r="14" fill="#0a0a0a" stroke="url(#chromeGrad)" stroke-width="1.5"/>
  
  <!-- Lock Icon -->
  <g fill="none" stroke="#C0C0C0" stroke-width="1.5" filter="url(#glow)">
    <!-- Lock Body -->
    <rect x="9" y="14" width="14" height="11" rx="2" fill="#1a1a1a"/>
    <!-- Lock Shackle -->
    <path d="M12 14 L12 10 Q12 6 16 6 Q20 6 20 10 L20 14"/>
    <!-- Keyhole -->
    <circle cx="16" cy="19" r="2" fill="#C0C0C0"/>
    <line x1="16" y1="20" x2="16" y2="23" stroke="#C0C0C0" stroke-width="2"/>
  </g>
</svg>
