<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="closeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E0E0E0"/>
      <stop offset="50%" style="stop-color:#C0C0C0"/>
      <stop offset="100%" style="stop-color:#808080"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="16" cy="16" r="14" fill="#0a0a0a" stroke="url(#closeGrad)" stroke-width="1.5"/>
  
  <!-- X Mark -->
  <g stroke="url(#closeGrad)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)">
    <line x1="10" y1="10" x2="22" y2="22"/>
    <line x1="22" y1="10" x2="10" y2="22"/>
  </g>
</svg>
