<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="chromeBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </linearGradient>
    <linearGradient id="chromeAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="30%" style="stop-color:#C0C0C0"/>
      <stop offset="70%" style="stop-color:#A0A0A0"/>
      <stop offset="100%" style="stop-color:#808080"/>
    </linearGradient>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E0E0E0"/>
      <stop offset="50%" style="stop-color:#A0A0A0"/>
      <stop offset="100%" style="stop-color:#606060"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="1" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="32" cy="32" r="28" fill="url(#chromeBg)" stroke="url(#chromeAccent)" stroke-width="2"/>
  
  <!-- Poker Chips Stack -->
  <g filter="url(#shadow)">
    <!-- Bottom Chip -->
    <ellipse cx="24" cy="40" rx="12" ry="4" fill="#606060" stroke="#808080" stroke-width="1"/>
    <ellipse cx="24" cy="38" rx="12" ry="4" fill="url(#chipGrad)" stroke="#A0A0A0" stroke-width="1"/>
    
    <!-- Middle Chip -->
    <ellipse cx="24" cy="34" rx="12" ry="4" fill="#505050" stroke="#707070" stroke-width="1"/>
    <ellipse cx="24" cy="32" rx="12" ry="4" fill="url(#chipGrad)" stroke="#A0A0A0" stroke-width="1"/>
    
    <!-- Top Chip -->
    <ellipse cx="24" cy="28" rx="12" ry="4" fill="#404040" stroke="#606060" stroke-width="1"/>
    <ellipse cx="24" cy="26" rx="12" ry="4" fill="url(#chipGrad)" stroke="#C0C0C0" stroke-width="1"/>
    <text x="24" y="28" text-anchor="middle" font-size="5" font-weight="bold" fill="#1a1a1a">100</text>
  </g>
  
  <!-- Playing Cards -->
  <g transform="translate(34, 18) rotate(15)" filter="url(#shadow)">
    <rect x="0" y="0" width="18" height="24" rx="2" fill="#1a1a1a" stroke="#C0C0C0" stroke-width="1"/>
    <text x="3" y="10" font-size="8" fill="#C0C0C0">A</text>
    <text x="9" y="20" font-size="10" fill="#C0C0C0">♠</text>
  </g>
  
  <g transform="translate(38, 22) rotate(-10)" filter="url(#shadow)">
    <rect x="0" y="0" width="18" height="24" rx="2" fill="#0a0a0a" stroke="#E0E0E0" stroke-width="1"/>
    <text x="3" y="10" font-size="8" fill="#E0E0E0">K</text>
    <text x="9" y="20" font-size="10" fill="#E0E0E0">♦</text>
  </g>
</svg>
