<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="chromeBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </linearGradient>
    <linearGradient id="chromeAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="30%" style="stop-color:#C0C0C0"/>
      <stop offset="70%" style="stop-color:#A0A0A0"/>
      <stop offset="100%" style="stop-color:#808080"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Monitor Frame -->
  <rect x="6" y="8" width="52" height="36" rx="4" fill="url(#chromeBg)" stroke="url(#chromeAccent)" stroke-width="2"/>
  
  <!-- Screen -->
  <rect x="10" y="12" width="44" height="28" rx="2" fill="url(#screenGrad)" stroke="#606060" stroke-width="1"/>
  
  <!-- Live Indicator -->
  <g filter="url(#glow)">
    <circle cx="16" cy="18" r="3" fill="#C0C0C0"/>
    <circle cx="16" cy="18" r="2" fill="#FFFFFF">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="24" y="20" font-family="Arial" font-size="6" font-weight="bold" fill="#C0C0C0">LIVE</text>
  
  <!-- Roulette Table Icon -->
  <ellipse cx="32" cy="30" rx="14" ry="8" fill="none" stroke="#808080" stroke-width="1.5"/>
  <ellipse cx="32" cy="30" rx="8" ry="4" fill="none" stroke="#606060" stroke-width="1"/>
  <circle cx="32" cy="30" r="2" fill="#C0C0C0"/>
  
  <!-- Monitor Stand -->
  <rect x="26" y="44" width="12" height="4" fill="url(#chromeAccent)"/>
  <rect x="22" y="48" width="20" height="3" rx="1" fill="url(#chromeAccent)" stroke="#808080" stroke-width="0.5"/>
  
  <!-- Decorative dots -->
  <circle cx="48" cy="18" r="1" fill="#606060"/>
  <circle cx="48" cy="22" r="1" fill="#606060"/>
</svg>
