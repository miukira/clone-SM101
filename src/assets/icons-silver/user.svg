<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="chromeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="30%" style="stop-color:#C0C0C0"/>
      <stop offset="70%" style="stop-color:#A0A0A0"/>
      <stop offset="100%" style="stop-color:#808080"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <circle cx="16" cy="16" r="14" fill="#0a0a0a" stroke="url(#chromeGrad)" stroke-width="1.5"/>
  
  <!-- User Icon -->
  <g fill="none" stroke="#C0C0C0" stroke-width="1.5" filter="url(#glow)">
    <!-- Head -->
    <circle cx="16" cy="12" r="5" fill="#1a1a1a"/>
    <!-- Body -->
    <path d="M8 26 Q8 20 16 20 Q24 20 24 26" fill="#1a1a1a"/>
  </g>
</svg>
