<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none">
  <defs>
    <pattern id="dotPattern" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="10" height="10" fill="#0a0a0a"/>
      <circle cx="5" cy="5" r="0.8" fill="#252525"/>
    </pattern>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="70%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
  </defs>
  
  <!-- Background with radial glow -->
  <rect x="0" y="0" width="100" height="100" fill="url(#centerGlow)"/>
  
  <!-- Dot Pattern -->
  <rect x="0" y="0" width="100" height="100" fill="url(#dotPattern)" opacity="0.8"/>
</svg>
