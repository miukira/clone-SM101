<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none">
  <defs>
    <pattern id="gridPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="20" height="20" fill="#0a0a0a"/>
      <line x1="20" y1="0" x2="20" y2="20" stroke="#1a1a1a" stroke-width="0.5"/>
      <line x1="0" y1="20" x2="20" y2="20" stroke="#1a1a1a" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="overlayGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000000" stop-opacity="0"/>
      <stop offset="50%" style="stop-color:#1a1a1a" stop-opacity="0.2"/>
      <stop offset="100%" style="stop-color:#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <!-- Base -->
  <rect x="0" y="0" width="100" height="100" fill="#000000"/>
  
  <!-- Grid Pattern -->
  <rect x="0" y="0" width="100" height="100" fill="url(#gridPattern)"/>
  
  <!-- Silver accent lines at intervals -->
  <line x1="0" y1="50" x2="100" y2="50" stroke="#303030" stroke-width="0.3"/>
  <line x1="50" y1="0" x2="50" y2="100" stroke="#303030" stroke-width="0.3"/>
  
  <!-- Overlay -->
  <rect x="0" y="0" width="100" height="100" fill="url(#overlayGrad)"/>
</svg>
