<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 200" preserveAspectRatio="none">
  <defs>
    <linearGradient id="footerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="30%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#0f0f0f"/>
    </linearGradient>
    <linearGradient id="chromeLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="20%" style="stop-color:#303030"/>
      <stop offset="50%" style="stop-color:#808080"/>
      <stop offset="80%" style="stop-color:#303030"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </linearGradient>
  </defs>
  
  <!-- Footer Background -->
  <rect x="0" y="0" width="1920" height="200" fill="url(#footerGrad)"/>
  
  <!-- Top Chrome Line -->
  <rect x="0" y="0" width="1920" height="1" fill="url(#chromeLine)"/>
  <rect x="0" y="1" width="1920" height="1" fill="#1a1a1a"/>
</svg>
