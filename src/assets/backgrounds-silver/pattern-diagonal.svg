<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none">
  <defs>
    <pattern id="diagonalLines" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#181818" stroke-width="1"/>
    </pattern>
    <linearGradient id="fadeOverlay" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000" stop-opacity="0.8"/>
      <stop offset="50%" style="stop-color:#0a0a0a" stop-opacity="0"/>
      <stop offset="100%" style="stop-color:#000000" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  
  <!-- Base -->
  <rect x="0" y="0" width="100" height="100" fill="#0a0a0a"/>
  
  <!-- Diagonal Lines -->
  <rect x="0" y="0" width="100" height="100" fill="url(#diagonalLines)"/>
  
  <!-- Subtle silver accent -->
  <line x1="0" y1="0" x2="100" y2="100" stroke="#303030" stroke-width="0.2"/>
  <line x1="100" y1="0" x2="0" y2="100" stroke="#303030" stroke-width="0.2"/>
  
  <!-- Overlay -->
  <rect x="0" y="0" width="100" height="100" fill="url(#fadeOverlay)"/>
</svg>
