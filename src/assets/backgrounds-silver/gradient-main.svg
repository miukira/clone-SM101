<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="none">
  <defs>
    <!-- Main Background Gradient -->
    <linearGradient id="mainBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="30%" style="stop-color:#0f0f0f"/>
      <stop offset="70%" style="stop-color:#080808"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </linearGradient>
    
    <!-- Silver Glow Spots -->
    <radialGradient id="glowSpot1" cx="20%" cy="20%" r="30%">
      <stop offset="0%" style="stop-color:#C0C0C0" stop-opacity="0.08"/>
      <stop offset="100%" style="stop-color:#000000" stop-opacity="0"/>
    </radialGradient>
    
    <radialGradient id="glowSpot2" cx="80%" cy="80%" r="35%">
      <stop offset="0%" style="stop-color:#A0A0A0" stop-opacity="0.06"/>
      <stop offset="100%" style="stop-color:#000000" stop-opacity="0"/>
    </radialGradient>
    
    <radialGradient id="glowSpot3" cx="50%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#808080" stop-opacity="0.04"/>
      <stop offset="100%" style="stop-color:#000000" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>
  
  <!-- Main Background -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#mainBg)"/>
  
  <!-- Glow Spots -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#glowSpot1)"/>
  <rect x="0" y="0" width="1920" height="1080" fill="url(#glowSpot2)"/>
  <rect x="0" y="0" width="1920" height="1080" fill="url(#glowSpot3)"/>
  
  <!-- Subtle noise overlay -->
  <rect x="0" y="0" width="1920" height="1080" filter="url(#noise)" opacity="0.03"/>
  
  <!-- Vignette -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#glowSpot3)" style="mix-blend-mode: multiply"/>
</svg>
