<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer glow -->
  <defs>
    <radialGradient id="coinGlow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#FFF9C4;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#FFA000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E65100;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="coinShine" cx="38%" cy="30%" r="45%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#FF6F00" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Shadow underneath -->
  <ellipse cx="50" cy="95" rx="32" ry="5" fill="#FF6F00" opacity="0.3"/>
  
  <!-- Main coin circle -->
  <circle cx="50" cy="50" r="44" fill="#B8860B" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="42" fill="url(#coinGlow)"/>
  
  <!-- Rim detail -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#FF8F00" stroke-width="2.5"/>
  <circle cx="50" cy="50" r="38" fill="none" stroke="#FFD700" stroke-width="1" stroke-dasharray="3,2"/>
  
  <!-- Inner content circle -->
  <circle cx="50" cy="50" r="34" fill="#FFB300" opacity="0.3"/>
  
  <!-- $ symbol -->
  <text x="50" y="58" font-family="Georgia, serif" font-size="36" font-weight="bold" 
        text-anchor="middle" fill="#7A4F00" opacity="0.5">$</text>
  <text x="50" y="57" font-family="Georgia, serif" font-size="36" font-weight="bold" 
        text-anchor="middle" fill="#FFF8E1">$</text>
  
  <!-- Shine overlay -->
  <circle cx="50" cy="50" r="42" fill="url(#coinShine)"/>
  
  <!-- Highlight arc top-left -->
  <path d="M 22 35 Q 30 18 50 15 Q 65 14 72 25" stroke="white" stroke-width="3" fill="none" 
        stroke-linecap="round" opacity="0.5"/>
</svg>