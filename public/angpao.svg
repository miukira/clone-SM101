<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" width="64" height="80">
  <!-- Red envelope body -->
  <rect x="8" y="12" width="48" height="60" rx="4" fill="#e63946" stroke="#b32d38" stroke-width="2"/>
  
  <!-- Gold band at top -->
  <rect x="8" y="24" width="48" height="12" fill="#ffd700"/>
  
  <!-- Gold circle in center -->
  <circle cx="32" cy="50" r="14" fill="#ffd700" stroke="#cc9900" stroke-width="2"/>
  
  <!-- Simple decoration in circle -->
  <rect x="28" y="42" width="8" height="16" fill="#e63946"/>
  <rect x="24" y="46" width="16" height="8" fill="#e63946"/>
  
  <!-- Top flap -->
  <polygon points="22,12 32,2 42,12" fill="#ffd700" stroke="#cc9900" stroke-width="1"/>
  
  <!-- Decorative lines -->
  <line x1="16" y1="36" x2="48" y2="36" stroke="#cc9900" stroke-width="1"/>
</svg>
